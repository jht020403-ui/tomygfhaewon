<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FFF8F3"/>
  
  <!-- Decorative hearts (background) -->
  <text x="100" y="100" font-size="48" opacity="0.15">💕</text>
  <text x="1050" y="150" font-size="56" opacity="0.12">💗</text>
  <text x="150" y="550" font-size="52" opacity="0.14">💘</text>
  <text x="980" y="520" font-size="44" opacity="0.13">🤍</text>
  
  <!-- Main title -->
  <text x="600" y="200" font-size="72" font-weight="900" text-anchor="middle" fill="#4A3B3E" font-family="system-ui, -apple-system, sans-serif" letter-spacing="-1">
    현태와 데이트
  </text>
  <text x="600" y="290" font-size="72" font-weight="900" text-anchor="middle" fill="#FF6B81" font-family="system-ui, -apple-system, sans-serif" letter-spacing="-1">
    하시겠습니까?
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="380" font-size="32" text-anchor="middle" fill="#B9A6AA" font-family="system-ui, -apple-system, sans-serif">
    신중하게 선택해 주세요.
  </text>
  <text x="600" y="430" font-size="28" text-anchor="middle" fill="#B9A6AA" font-family="system-ui, -apple-system, sans-serif" font-style="italic">
    (사실 선택지는 하나입니다)
  </text>
  
  <!-- Center emoji -->
  <text x="600" y="520" font-size="88" text-anchor="middle">💌</text>
  
  <!-- Accent dots -->
  <circle cx="250" cy="300" r="8" fill="#FF6B81" opacity="0.4"/>
  <circle cx="950" cy="350" r="6" fill="#FFD3DA" opacity="0.6"/>
  <circle cx="100" cy="450" r="7" fill="#FF6B81" opacity="0.3"/>
</svg>